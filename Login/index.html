<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <img class="image" src="flodesk.jpg" />
      <div class="login">
        <h3 class="heading">Welcome back!</h3>
        <input class="input" type="text" placeholder="Enter your email" /><br />
        <input
          class="input"
          type="password"
          placeholder="Enter your password "
        /><br />
        <button class="button">Log in to flodesk</button>
        <p class="text">Not a member?<a class="link" href="#">Sign up</a></p>
        <p class="text"><a class="link" href="#">Forgot your password?</a></p>

        <p class="last text">
          By continuing you agree to Foldesk's
          <a class="link" href="#">terms</a> and acknowledge ypu've read our
          <a class="link" href="#">privacy policy</a>
        </p>
      </div>
    </div>
  </body>
</html>
