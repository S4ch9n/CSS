<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <img class="zomato-back-img" src="image.webp"alt="zomato-photo">
        <div class="wrapper">
        <h1 class="zomato-heading">
            zomato
        </h1>
        <h3 class="bottom-heading">
            Discover the best food & drinks in Lucknow
        </h3>
        <div class="input-field">
            <div class="left-input">
<select class="location-field" id="location" name="location">
    <option value="lucknow">Lucknow</option>
    <!-- You can add more options below -->
    <option value="delhi">Delhi</option>
    <option value="mumbai">Mumbai</option>
    <option value="chennai">Chennai</option>
    <option value="kolkata">Kolkata</option>
    </select>
    </div>
    <div class="right-input">
        <input class="search-field" type="search" placeholder="Search of restaurant , cusine or dish">
    </div>
        </div>
        </div>
    </div>
</body>
</html>
